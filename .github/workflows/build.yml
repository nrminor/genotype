name: Build Native Modules
on:
  push:
    tags: ["v*"]
    paths:
      - "crates/**/*.rs"
      - "crates/**/Cargo.toml"
      - "Cargo.toml"
      - "rust-toolchain*"
      - ".cargo/config.toml"
      - "scripts/build.mjs"
  pull_request:
    paths:
      - "crates/**/*.rs"
      - "crates/**/Cargo.toml"
      - "Cargo.toml"
      - "rust-toolchain*"
      - ".cargo/config.toml"
      - "scripts/build.mjs"
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: nightly-2026-03-05

jobs:
  build-native:
    name: Build ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - platform: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: win32-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.os == 'ubuntu-latest' && contains(matrix.target, 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build native module
        run: cargo build -p genotype-napi --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/libgenotype*.* artifacts/${{ matrix.platform }}/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/*.so artifacts/${{ matrix.platform }}/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/*.dylib artifacts/${{ matrix.platform }}/ 2>/dev/null || true
          ls -la artifacts/${{ matrix.platform }}/

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/*.dll artifacts/${{ matrix.platform }}/ 2>$null || true
          ls artifacts/${{ matrix.platform }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genotype-${{ matrix.platform }}
          path: artifacts/${{ matrix.platform }}
          retention-days: 7
