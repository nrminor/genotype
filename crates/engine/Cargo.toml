[package]
name = "genotype-engine"
version = "0.1.0"
edition = "2021"
description = "Presentation-agnostic compute kernels for genotype bioinformatics library"

[lib]
crate-type = ["rlib"]

[dependencies]
rayon = "1.11"
sassy = { version = "0.2.0", default-features = false }
smallvec = "1.15"
xxhash-rust = { version = "0.8", features = ["xxh3"] }

[lints]
workspace = true
