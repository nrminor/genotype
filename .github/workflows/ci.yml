name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: 1.3.10
  RUST_TOOLCHAIN: nightly-2026-03-05

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2

      - name: Build wasm types (required for typecheck)
        run: bun run build:wasm:dev

      - name: TypeScript type check (tsgo)
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type-aware linting (oxlint)
        run: bun run lint:types
        continue-on-error: true

      - name: Format check (oxfmt)
        run: bun run format:check

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Run Rust linting
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: [1.3.10]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native module
        run: bun run build:native:dev

      - name: Run TypeScript tests
        run: bun run test

  test-rust:
    name: Test Rust
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2

      - name: Run Rust tests
        run: cargo test --workspace

  integration-test:
    name: Integration Tests
    needs: [test, test-rust]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native module
        run: bun run build:native:dev

      - name: Build wasm module
        run: bun run build:wasm:dev

      - name: Run full validation suite
        run: bun run validate
